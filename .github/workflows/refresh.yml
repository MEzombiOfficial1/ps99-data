name: Refresh Pet Data
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python update.py
      - name: Commit if changed
        run: |
          git config user.name "auto"
          git config user.email "auto@auto.com"
          git add pets.json
          git diff --staged --quiet || git commit -m "auto: refresh pet data"
          git push
