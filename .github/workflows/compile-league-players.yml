name: Compile League Players

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile top 5,000 league players
        run: |
          python3 - <<'EOF'
          import json, urllib.request, urllib.parse, re, time
          from concurrent.futures import ThreadPoolExecutor, as_completed

          UA = {'User-Agent': 'PS99-Hub-Compiler/1.0'}

          def fetch_json(url):
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=15) as resp:
                  return json.loads(resp.read())

          def fetch_league_detail(name):
              try:
                  url = 'https://ps99.biggamesapi.io/v1/leagues/' + urllib.parse.quote(name)
                  d = fetch_json(url)
                  data = d.get('data', {})
                  return {
                      'name': data.get('Name', name),
                      'icon': data.get('Icon'),
                      'points': data.get('Points', 0),
                      'contributors': data.get('PointContributions', [])
                  }
              except:
                  return None

          print("Fetching top 2,500 leagues...")
          all_leagues = []
          for page in range(1, 26):
              try:
                  d = fetch_json(f'https://ps99.biggamesapi.io/v1/leagues?page={page}&pageSize=100&sort=Points&sortOrder=desc')
                  leagues = d.get('data', {}).get('leagues', [])
                  all_leagues.extend(leagues)
                  print(f"  page {page}: {len(leagues)} leagues (total: {len(all_leagues)})")
                  if not leagues:
                      break
                  time.sleep(0.3)
              except Exception as e:
                  print(f"  page {page} error: {e}")
                  break

          print(f"Fetching details for {len(all_leagues)} leagues (parallel)...")
          league_details = {}
          with ThreadPoolExecutor(max_workers=20) as pool:
              futures = {pool.submit(fetch_league_detail, l['Name']): l['Name'] for l in all_leagues if l.get('Name')}
              done = 0
              for f in as_completed(futures):
                  result = f.result()
                  if result:
                      league_details[result['name']] = result
                  done += 1
                  if done % 500 == 0:
                      print(f"  {done}/{len(all_leagues)} done...")

          print(f"Got details for {len(league_details)} leagues")

          print("Compiling player contributions...")
          players_map = {}
          league_icon_map = {}
          for name, detail in league_details.items():
              if detail.get('icon'):
                  m = re.search(r'(\d+)', str(detail['icon']))
                  if m:
                      league_icon_map[name] = m.group(1)
              for c in detail.get('contributors', []):
                  uid = c.get('UserID')
                  if not uid:
                      continue
                  display = c.get('DisplayName', '')
                  if not display or re.match(r'^\d+$', str(display)):
                      display = 'Player #' + str(uid)
                  pts = c.get('Points', 0)
                  existing = players_map.get(uid)
                  if existing is None or pts > existing['points']:
                      players_map[uid] = {
                          'userId': uid,
                          'displayName': display,
                          'points': pts,
                          'timestamp': c.get('Timestamp'),
                          'leagueName': name,
                          'leagueId': detail.get('name', ''),
                          'leagueIcon': detail.get('icon'),
                          'leaguePoints': detail.get('points', 0)
                      }

          print(f"{len(players_map)} unique players")

          print("Resolving league icons via Roblox thumbnails...")
          asset_ids = list(set(league_icon_map.values()))
          icon_urls = {}
          for i in range(0, len(asset_ids), 100):
              batch = asset_ids[i:i+100]
              try:
                  url = f'https://thumbnails.roblox.com/v1/assets?assetIds={",".join(batch)}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false'
                  d = fetch_json(url)
                  for item in d.get('data', []):
                      if item.get('state') == 'Completed':
                          icon_urls[str(item['targetId'])] = item.get('imageUrl')
              except:
                  pass

          print(f"{len(icon_urls)} icons resolved")

          print("Sorting + taking top 5,000...")
          players = list(players_map.values())
          players.sort(key=lambda p: p['points'], reverse=True)
          top_5k = players[:5000]

          for p in top_5k:
              icon_asset = league_icon_map.get(p['leagueName'])
              p['leagueIconUrl'] = icon_urls.get(icon_asset) if icon_asset else None

          output = {
              'total': len(top_5k),
              'players': top_5k,
              'compiledAt': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'source': 'Compiled from top 2,500 league details via PS99 v1 API'
          }

          with open('league_players.json', 'w') as f:
              json.dump(output, f, separators=(',', ':'))

          print(f"Done! {len(top_5k)} players written to league_players.json")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add league_players.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update league players ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
